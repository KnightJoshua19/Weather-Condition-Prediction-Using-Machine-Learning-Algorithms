version: '3.8'

services:
  # Backend API Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: waste-management-api
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      CORS_ORIGINS: 'http://localhost:5173,http://frontend:5173,http://localhost:3000'
    volumes:
      - ./public_data_waste_fee.csv:/app/public_data_waste_fee.csv:ro
      - ./The Output:/app/The Output
    networks:
      - waste-management-network
    command: python api_server.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Application (Optional - if running React in Docker)
  frontend:
    build:
      context: ./Non-Biodigradable\ Policymaking\ Assistant_UserInterface
      dockerfile: Dockerfile
    container_name: waste-management-ui
    ports:
      - "5173:5173"
    environment:
      REACT_APP_API_URL: http://backend:5000/api
      REACT_APP_ENV: production
    networks:
      - waste-management-network
    depends_on:
      backend:
        condition: service_healthy

networks:
  waste-management-network:
    driver: bridge

volumes:
  data:
    driver: local
